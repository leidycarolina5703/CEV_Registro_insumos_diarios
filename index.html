<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Diario de Insumos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f3f4f6; }
        ::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .loader {
            border: 3px solid #f3f3f3; border-radius: 50%;
            border-top: 3px solid #154390; width: 24px; height: 24px;
            -webkit-animation: spin 1s linear infinite; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">

    <div id="login-screen" class="fixed inset-0 bg-[#154390] flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4">
            <div class="text-center mb-8">
                <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-shield-halved text-3xl text-[#154390]"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Acceso Seguro</h2>
                <p class="text-gray-500 text-sm mt-2">Ingresa tus credenciales para continuar</p>
            </div>
            
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Correo Electrónico</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-3 top-3 text-gray-400"></i>
                        <input type="email" id="email-input" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#154390] focus:border-transparent bg-gray-50" placeholder="usuario@clinica.com">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Contraseña</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3 top-3 text-gray-400"></i>
                        <input type="password" id="password-input" required class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#154390] focus:border-transparent bg-gray-50" placeholder="••••••••">
                        
                        <button type="button" id="toggle-password" class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600 focus:outline-none">
                            <i class="fa-solid fa-eye" id="toggle-icon"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember-me" class="w-4 h-4 text-[#154390] border-gray-300 rounded focus:ring-[#154390]">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-700">
                        Recordar mi sesión en este equipo
                    </label>
                </div>

                <div id="login-error" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg flex items-center gap-2">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="login-error-text">Credenciales incorrectas</span>
                </div>

                <button type="submit" id="btn-login" class="w-full py-2.5 bg-[#154390] text-white rounded-lg font-bold hover:bg-blue-800 transition-colors shadow-md flex justify-center items-center gap-2">
                    <span>Ingresar al Sistema</span>
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="main-app" class="hidden max-w-4xl mx-auto p-4 sm:p-6 space-y-6 pb-12">
        
        <header class="bg-white rounded-xl shadow-md p-6 flex flex-col md:flex-row justify-between items-center gap-4 border border-gray-200">
            <div>
                <h1 class="text-2xl font-bold text-[#154390] flex items-center gap-2">
                    <i class="fa-solid fa-cloud"></i> Control de Insumos
                </h1>
                <p class="text-gray-500 text-sm mt-1">Sincronizado en la nube con Firebase</p>
            </div>
            <div class="flex flex-col items-end w-full md:w-auto gap-4">
                <button onclick="logoutUser()" class="text-sm text-red-600 hover:text-red-800 font-semibold flex items-center gap-1 transition-colors">
                    <i class="fa-solid fa-power-off"></i> Cerrar Sesión
                </button>
                <div class="text-right">
                    <label for="report-date" class="text-sm font-semibold text-gray-600 uppercase tracking-wide mb-1 block">Fecha del registro</label>
                    <div class="flex items-center gap-3">
                        <div id="loading-spinner" class="loader hidden"></div>
                        <input type="date" id="report-date" class="w-full md:w-auto border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#154390] bg-gray-50 text-[#154390] font-bold shadow-sm cursor-pointer hover:bg-gray-200 transition-colors">
                    </div>
                </div>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-md p-4 border border-gray-200 flex flex-col sm:flex-row gap-4 justify-between items-center sticky top-0 z-10">
            <div class="relative w-full sm:w-1/2">
                <i class="fa-solid fa-search absolute left-3 top-3.5 text-gray-400"></i>
                <input type="text" id="search-input" placeholder="Buscar insumo..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#154390] focus:border-transparent transition-all bg-gray-50">
            </div>
            <div class="flex w-full sm:w-auto">
                <button onclick="clearAll()" class="w-full sm:w-auto px-6 py-2 text-gray-600 bg-gray-200 hover:bg-gray-300 rounded-lg font-medium transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-trash-can"></i> Limpiar Día
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto max-h-[600px] overflow-y-auto">
                <table class="w-full text-left border-collapse relative">
                    <thead class="sticky top-0 z-20 shadow-sm">
                        <tr class="bg-gray-200 border-b border-gray-300">
                            <th class="p-4 font-semibold text-gray-700">Insumo</th>
                            <th class="p-4 font-semibold text-gray-700 text-center w-24">Ideal</th>
                            <th class="p-4 font-bold text-[#154390] text-center w-32">Stock Actual</th>
                            <th class="p-4 font-semibold text-gray-700 text-center w-28">A Reponer</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md border border-gray-200 p-6">
            <h2 class="text-xl font-bold text-[#154390] mb-4 border-b border-gray-100 pb-2 flex items-center gap-2">
                <i class="fa-solid fa-file-excel text-green-600"></i> Exportar Historial desde la Nube
            </h2>
            <div class="flex flex-col md:flex-row items-end gap-4">
                <div class="w-full md:w-1/3">
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Fecha Inicio</label>
                    <input type="date" id="export-start" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#154390] bg-gray-50 text-gray-700">
                </div>
                <div class="w-full md:w-1/3">
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Fecha Fin</label>
                    <input type="date" id="export-end" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#154390] bg-gray-50 text-gray-700">
                </div>
                <div class="w-full md:w-1/3">
                    <button onclick="generarExcel()" class="w-full px-4 py-2 text-white bg-green-600 hover:bg-green-700 rounded-lg font-medium transition-colors shadow-sm flex items-center justify-center gap-2">
                        <i class="fa-solid fa-download"></i> Descargar Excel
                    </button>
                </div>
            </div>
        </div>

        <div id="toast" class="fixed bottom-4 right-4 bg-[#154390] text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-2 border border-gray-300">
            <i class="fa-solid fa-check-circle text-gray-200"></i>
            <span id="toast-msg">Mensaje</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // LLAVES DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBSzvWwy61Zexsy4dBSCJZtCChBLge7Nlk",
            authDomain: "cev-registro-insumos-diarios.firebaseapp.com",
            projectId: "cev-registro-insumos-diarios",
            storageBucket: "cev-registro-insumos-diarios.firebasestorage.app",
            messagingSenderId: "413989996861",
            appId: "1:413989996861:web:fc3803b16ea1a998b51d54",
            measurementId: "G-47QTZXMHSB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- SISTEMA DE AUTENTICACIÓN ---
        
        // Mostrar/Ocultar contraseña
        document.getElementById('toggle-password').addEventListener('click', function () {
            const passwordInput = document.getElementById('password-input');
            const toggleIcon = document.getElementById('toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash'); // Cambia al ícono de ojito tachado
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        });
        
        onAuthStateChanged(auth, (user) => {
            const loginScreen = document.getElementById('login-screen');
            const mainApp = document.getElementById('main-app');
            
            if (user) {
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                initApp(); 
            } else {
                loginScreen.classList.remove('hidden');
                mainApp.classList.add('hidden');
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            const rememberMe = document.getElementById('remember-me').checked;
            const errorBox = document.getElementById('login-error');
            const btnLogin = document.getElementById('btn-login');

            errorBox.classList.add('hidden');
            btnLogin.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Procesando...';
            btnLogin.disabled = true;

            try {
                const persistenceType = rememberMe ? browserLocalPersistence : browserSessionPersistence;
                await setPersistence(auth, persistenceType);
                await signInWithEmailAndPassword(auth, email, password);
                
            } catch (error) {
                errorBox.classList.remove('hidden');
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    document.getElementById('login-error-text').innerText = "Correo o contraseña incorrectos.";
                } else {
                    document.getElementById('login-error-text').innerText = "Ocurrió un error. Intenta de nuevo.";
                }
            } finally {
                btnLogin.innerHTML = '<span>Ingresar al Sistema</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>';
                btnLogin.disabled = false;
            }
        });

        window.logoutUser = () => {
            signOut(auth).then(() => {
                document.getElementById('email-input').value = '';
                document.getElementById('password-input').value = '';
                // Al salir, nos aseguramos de que la contraseña vuelva a estar oculta por defecto
                document.getElementById('password-input').type = 'password';
                document.getElementById('toggle-icon').className = 'fa-solid fa-eye';
            }).catch((error) => {
                console.error("Error cerrando sesión:", error);
            });
        };

        // --- LÓGICA DE LA APLICACIÓN ---

        const defaultData = [
            { name: "Catéter 24", ideal: 20 }, { name: "Catéter 22", ideal: 20 }, { name: "Catéter 20", ideal: 20 },
            { name: "Catéter 18", ideal: 5 }, { name: "Catéter 16", ideal: 5 }, { name: "Catéter 14", ideal: 5 },
            { name: "Llave 3 vías", ideal: 5 }, { name: "Tapones", ideal: 15 }, { name: "Pericraneal pequeño", ideal: 5 },
            { name: "Pericraneal grueso", ideal: 5 }, { name: "Microgoteo", ideal: 15 }, { name: "Macrogoteo", ideal: 15 },
            { name: "Buretrol", ideal: 5 }, { name: "Venobomba", ideal: 10 }, { name: "Máscara de nebulización", ideal: 5 },
            { name: "Sonda gato", ideal: 5 }, { name: "Extensiones", ideal: 10 }, { name: "Sonda 5", ideal: 5 },
            { name: "Sonda 6", ideal: 5 }, { name: "Sonda 8", ideal: 5 }, { name: "Sonda 10", ideal: 5 },
            { name: "Sonda 12", ideal: 5 }, { name: "Sonda 14", ideal: 5 }, { name: "Sonda 16", ideal: 5 },
            { name: "Sonda 18", ideal: 5 }, { name: "Vestido XS", ideal: 1 }, { name: "Vestido S", ideal: 1 },
            { name: "Vestido M", ideal: 1 }, { name: "Vestido L", ideal: 1 }, { name: "Vestido XL", ideal: 1 },
            { name: "Metronidazol", ideal: 5 }, { name: "Pregabalina 75 mg", ideal: 15 }, { name: "Trimetoprim", ideal: 5 },
            { name: "Esomeprazol", ideal: 5 }, { name: "Silimarina", ideal: 5 }, { name: "Bladuvil", ideal: 5 },
            { name: "Mirtazapina", ideal: 5 }, { name: "Amoxicilina", ideal: 5 }, { name: "Ursacol", ideal: 5 },
            { name: "Flunarizina", ideal: 5 }, { name: "Cefalexina", ideal: 5 }, { name: "Sulfadiazina", ideal: 5 },
            { name: "Trazodona", ideal: 10 }, { name: "Pregabalina 25 mg", ideal: 15 }, { name: "Tramadol", ideal: 5 },
            { name: "Domperidona (Domevoro)", ideal: 5 }, { name: "Metronidazol vial 100 mg", ideal: 2 },
            { name: "Ampicilina", ideal: 4 }, { name: "Ceftriaxona", ideal: 4 }, { name: "Omeprazol inyectable", ideal: 5 },
            { name: "Ampicilina + sulbactam", ideal: 5 }, { name: "Cefalotina", ideal: 5 }, { name: "Gluconato de calcio", ideal: 4 },
            { name: "Cloruro de potasio", ideal: 5 }, { name: "Ginkgo biloba", ideal: 5 }, { name: "Melatonina", ideal: 5 },
            { name: "Omega 3", ideal: 5 }, { name: "Vitamina C", ideal: 5 }, { name: "Vitamina E", ideal: 5 },
            { name: "Ampolla de metilprednisolona", ideal: 2 }, { name: "Ondansetrón", ideal: 5 }, { name: "Ampolla Fluimucil", ideal: 5 },
            { name: "Complejo B", ideal: 3 }, { name: "Tiamina", ideal: 3 }, { name: "Cloruro de sodio (ampolla)", ideal: 10 },
            { name: "Vendaje Koban", ideal: 3 }, { name: "Vendaje de gasa", ideal: 3 }, { name: "Vendaje Algodón", ideal: 3 },
            { name: "Perfusora de 50", ideal: 2 }, { name: "Perfusora de 20", ideal: 2 }, { name: "Jeringa de 1mL", ideal: 15 },
            { name: "Jeringa de 3mL", ideal: 15 }, { name: "Jeringa de 5mL", ideal: 15 }, { name: "Jeringa de 10mL", ideal: 10 },
            { name: "Jeringa de 20mL", ideal: 5 }, { name: "Jeringa de 50mL", ideal: 2 }, { name: "Jeringa de 60mL", ideal: 2 },
            { name: "Hartmann 500 mL", ideal: 10 }, { name: "Solución salina 500mL", ideal: 5 }, { name: "Solución salina 250mL", ideal: 5 },
            { name: "Solución salina 100mL", ideal: 5 }, { name: "Solución Hartmann 1 L", ideal: 5 }, { name: "Gelofusine", ideal: 1 },
            { name: "Agua estéril", ideal: 1 }, { name: "Libra I/D Canino", ideal: 3 }, { name: "Libra I/D Gato", ideal: 3 },
            { name: "Arena gato", ideal: 4 }, { name: "Tapetes", ideal: 3 }, { name: "Lata EN", ideal: 2 },
            { name: "Lata ID Canino", ideal: 2 }, { name: "Lata ID Felino", ideal: 2 }, { name: "Lata AD", ideal: 2 },
            { name: "Fortiflora Canino", ideal: 15 }, { name: "Fortiflora Felino", ideal: 5 }
        ];

        let inventory = [];

        async function initApp() {
            setFechasIniciales();
            await loadDataFromFirebase();
            
            document.getElementById('search-input').addEventListener('input', (e) => {
                renderTable(e.target.value.toLowerCase());
            });

            document.getElementById('report-date').addEventListener('change', async () => {
                await loadDataFromFirebase();
            });
        }

        function toggleLoader(show) {
            const spinner = document.getElementById('loading-spinner');
            if(show) spinner.classList.remove('hidden');
            else spinner.classList.add('hidden');
        }

        function obtenerFechaString(dateObj) {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function setFechasIniciales() {
            const dateInput = document.getElementById('report-date');
            const exportStart = document.getElementById('export-start');
            const exportEnd = document.getElementById('export-end');
            
            const todayStr = obtenerFechaString(new Date());
            if(!dateInput.value) dateInput.value = todayStr;
            if(!exportStart.value) exportStart.value = todayStr;
            if(!exportEnd.value) exportEnd.value = todayStr;
        }

        async function loadDataFromFirebase() {
            toggleLoader(true);
            const fechaActual = document.getElementById('report-date').value;
            
            try {
                const docRef = doc(db, "inventarios", fechaActual);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    inventory = docSnap.data().items;
                    if(inventory.length !== defaultData.length) {
                        defaultData.forEach(defaultItem => {
                            if(!inventory.find(i => i.name === defaultItem.name)) {
                                inventory.push({...defaultItem, actual: ''});
                            }
                        });
                    }
                } else {
                    inventory = defaultData.map(item => ({ ...item, actual: '' }));
                }
            } catch (error) {
                console.error("Error al cargar de Firebase:", error);
                showToast("Error de conexión a la base de datos");
            } finally {
                renderTable(document.getElementById('search-input').value.toLowerCase());
                toggleLoader(false);
            }
        }

        let saveTimeout = null; 
        async function saveDataToFirebase() {
            const fechaActual = document.getElementById('report-date').value;
            toggleLoader(true);
            try {
                await setDoc(doc(db, "inventarios", fechaActual), { items: inventory });
            } catch (error) {
                console.error("Error al guardar en Firebase:", error);
                showToast("Error al guardar. Revisa tu conexión.");
            } finally {
                toggleLoader(false);
            }
        }

        function renderTable(filter = '') {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            inventory.forEach((item, index) => {
                if (item.name.toLowerCase().includes(filter)) {
                    const actualValue = item.actual !== '' ? parseInt(item.actual) : '';
                    let reponerValue = '';
                    let rowClass = 'hover:bg-gray-100 transition-colors';
                    let reponerClass = 'text-gray-400';

                    if (actualValue !== '') {
                        reponerValue = Math.max(0, item.ideal - actualValue);
                        if (reponerValue > 0) {
                            reponerClass = 'text-red-600 font-bold';
                            rowClass = 'bg-gray-50 hover:bg-gray-100 transition-colors';
                        } else {
                            reponerClass = 'text-green-600 font-bold';
                            rowClass = 'bg-gray-50 hover:bg-gray-100 transition-colors';
                        }
                    }

                    const tr = document.createElement('tr');
                    tr.className = rowClass;
                    tr.innerHTML = `
                        <td class="p-3 border-b border-gray-200 font-medium text-gray-700">${item.name}</td>
                        <td class="p-3 border-b border-gray-200 text-center font-bold text-gray-500">${item.ideal}</td>
                        <td class="p-3 border-b border-gray-200 text-center">
                            <input type="number" min="0" 
                                value="${item.actual}" 
                                oninput="window.updateItem(${index}, this.value)"
                                class="w-20 text-center py-1.5 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-[#154390] bg-white shadow-sm font-bold text-[#154390]"
                                placeholder="-"
                            >
                        </td>
                        <td class="p-3 border-b border-gray-200 text-center ${reponerClass} text-lg" id="reponer-${index}">
                            ${actualValue !== '' ? reponerValue : '-'}
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            });
        }

        window.updateItem = function(index, value) {
            if (value !== '' && parseInt(value) < 0) value = '0';
            inventory[index].actual = value;
            
            const actualValue = value !== '' ? parseInt(value) : '';
            const reponerCell = document.getElementById(`reponer-${index}`);
            const row = reponerCell.parentElement;

            if (actualValue !== '') {
                const reponerValue = Math.max(0, inventory[index].ideal - actualValue);
                reponerCell.textContent = reponerValue;
                
                if (reponerValue > 0) {
                    reponerCell.className = 'p-3 border-b border-gray-200 text-center text-red-600 font-bold text-lg';
                    row.className = 'bg-gray-50 hover:bg-gray-100 transition-colors';
                } else {
                    reponerCell.className = 'p-3 border-b border-gray-200 text-center text-green-600 font-bold text-lg';
                    row.className = 'bg-gray-50 hover:bg-gray-100 transition-colors';
                }
            } else {
                reponerCell.textContent = '-';
                reponerCell.className = 'p-3 border-b border-gray-200 text-center text-gray-400 text-lg';
                row.className = 'hover:bg-gray-100 transition-colors';
            }

            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveDataToFirebase();
            }, 1000);
        }

        window.clearAll = async function() {
            const fechaActual = document.getElementById('report-date').value;
            if(confirm(`¿Deseas borrar de la nube todos los datos del día ${fechaActual}?`)) {
                inventory = inventory.map(item => ({ ...item, actual: '' }));
                renderTable();
                await saveDataToFirebase();
                document.getElementById('search-input').value = '';
                showToast("Día limpiado en la nube");
            }
        }

        window.generarExcel = async function() {
            const start = document.getElementById('export-start').value;
            const end = document.getElementById('export-end').value;

            if (!start || !end) {
                showToast("Selecciona fecha de inicio y fin");
                return;
            }
            if (start > end) {
                showToast("La fecha de inicio debe ser anterior a la de fin");
                return;
            }

            showToast("Consultando a la nube...");
            toggleLoader(true);

            try {
                const q = query(
                    collection(db, "inventarios"), 
                    where("__name__", ">=", start), 
                    where("__name__", "<=", end)
                );
                
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    alert("No se encontraron registros en la nube para estas fechas.");
                    toggleLoader(false);
                    return;
                }

                const datosParaExcel = [];

                querySnapshot.forEach((doc) => {
                    const fecha = doc.id;
                    const items = doc.data().items;
                    
                    items.forEach(item => {
                        if (item.actual !== '') {
                            const actual = parseInt(item.actual);
                            const reponer = Math.max(0, item.ideal - actual);
                            
                            datosParaExcel.push({
                                "Fecha": fecha,
                                "Insumo": item.name,
                                "Stock Ideal": item.ideal,
                                "Stock Contado": actual,
                                "Repuesto (Faltante)": reponer
                            });
                        }
                    });
                });

                if (datosParaExcel.length === 0) {
                    alert("Se encontraron fechas en la nube, pero no hay datos numéricos.");
                    toggleLoader(false);
                    return;
                }

                const hoja = XLSX.utils.json_to_sheet(datosParaExcel);
                const libro = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(libro, hoja, "Insumos");
                XLSX.writeFile(libro, `Control_Insumos_${start}_al_${end}.xlsx`);
                
                showToast("Excel descargado correctamente");

            } catch (error) {
                console.error("Error al exportar:", error);
                alert("Hubo un problema al descargar los datos de la nube.");
            } finally {
                toggleLoader(false);
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
