        // --- CALENDARIO INTELIGENTE COLOMBIA ---
        function getHolidays(year) {
            const holidays = [];
            const addDays = (d, days) => new Date(d.getTime() + days * 86400000);
            const moveToMonday = (d) => {
                const day = d.getDay();
                if (day !== 1) {
                    const diff = (8 - day) % 7;
                    return addDays(d, diff === 0 ? 7 : diff);
                }
                return d;
            };
            const pushDate = (d) => {
                holidays.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
            };

            pushDate(new Date(year, 0, 1)); 
            pushDate(new Date(year, 4, 1)); 
            pushDate(new Date(year, 6, 20)); 
            pushDate(new Date(year, 7, 7)); 
            pushDate(new Date(year, 11, 8)); 
            pushDate(new Date(year, 11, 25)); 
            pushDate(moveToMonday(new Date(year, 0, 6))); 
            pushDate(moveToMonday(new Date(year, 2, 19))); 
            pushDate(moveToMonday(new Date(year, 5, 29))); 
            pushDate(moveToMonday(new Date(year, 7, 15))); 
            pushDate(moveToMonday(new Date(year, 9, 12))); 
            pushDate(moveToMonday(new Date(year, 10, 1))); 
            pushDate(moveToMonday(new Date(year, 10, 11))); 

            const a = year % 19, b = Math.floor(year / 100), c = year % 100;
            const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3);
            const h = (19 * a + b - d - g + 15) % 30, i = Math.floor(c / 4), k = c % 4;
            const l = (32 + 2 * e + 2 * i - h - k) % 7, m = Math.floor((a + 11 * h + 22 * l) / 451);
            const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
            const day = ((h + l - 7 * m + 114) % 31) + 1;
            const easter = new Date(year, month, day);

            pushDate(addDays(easter, -3)); 
            pushDate(addDays(easter, -2)); 
            pushDate(moveToMonday(addDays(easter, 39))); 
            pushDate(moveToMonday(addDays(easter, 60))); 
            pushDate(moveToMonday(addDays(easter, 68))); 

            return holidays;
        }

        function isYesterdayHoliday(dateString) {
            const [y, m, d] = dateString.split('-').map(Number);
            const currentDate = new Date(y, m - 1, d);
            const yesterday = new Date(currentDate.getTime() - 86400000); 
            const yesterdayStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
            
            const holidays = getHolidays(yesterday.getFullYear());
            if (yesterday.getMonth() === 11 && yesterday.getDate() === 31) {
                 const prevHolidays = getHolidays(yesterday.getFullYear());
                 return prevHolidays.includes(yesterdayStr);
            }
            return holidays.includes(yesterdayStr);
        }

            const dateInput = document.getElementById('report-date');
            const exportStart = document.getElementById('export-start');
            const exportEnd = document.getElementById('export-end');
            const d = new Date();
            const todayStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            
            if(!dateInput.value) dateInput.value = todayStr;
            if(!exportStart.value) exportStart.value = todayStr;
            if(!exportEnd.value) exportEnd.value = todayStr;
        }

        async function loadDataFromFirebase() {
            toggleLoader(true);
            const fechaActual = document.getElementById('report-date').value;
            
            try {
                const docRef = doc(db, "inventarios", fechaActual);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    let cloudData = docSnap.data().items;
                    inventory = cloudData.filter(cloudItem => 
                        defaultData.some(defaultItem => defaultItem.name === cloudItem.name)
                    );
                    defaultData.forEach(defaultItem => {
                        if (!inventory.find(i => i.name === defaultItem.name)) {
                            inventory.push({...defaultItem, actual: ''});
                        }
                    });
                } else {
                    inventory = defaultData.map(item => ({ ...item, actual: '' }));
                }

                // ==========================================
                // LÓGICA DE CANTIDADES POST-FESTIVO
                // ==========================================
                const wasHoliday = isYesterdayHoliday(fechaActual);
                const badge = document.getElementById('festivo-badge');
                
                if(wasHoliday) badge.classList.remove('hidden');
                else badge.classList.add('hidden');

                inventory.forEach(item => {
                    let idealFinal = defaultData.find(d => d.name === item.name).ideal;
                    
                    if (wasHoliday) {
                        if (item.name === "Jeringa de 1mL") idealFinal = 30;
                        if (item.name === "Jeringa de 3mL") idealFinal = 30;
                        if (item.name === "Jeringa de 5mL") idealFinal = 30;
                        if (item.name === "Solución Hartmann 1 L") idealFinal = 10;
                        if (item.name === "Hartmann 500 mL") idealFinal = 15;
                    }
                    
                    item.ideal = idealFinal; 
                });

            } catch (error) {
                console.error("Error al cargar de Firebase:", error);
                showToast("Error de conexión a la base de datos");
            } finally {
                renderTable(document.getElementById('search-input').value.toLowerCase());
                toggleLoader(false);
            }
        }

        let saveTimeout = null; 
        async function saveDataToFirebase() {
            const fechaActual = document.getElementById('report-date').value;
            toggleLoader(true);
            try {
                await setDoc(doc(db, "inventarios", fechaActual), { items: inventory });
            } catch (error) {
                showToast("Error al guardar. Revisa tu conexión.");
            } finally {
                toggleLoader(false);
            }
        }

        function renderTable(filter = '') {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            inventory.forEach((item, index) => {
                if (item.name.toLowerCase().includes(filter)) {
                    const actualValue = item.actual !== '' ? parseInt(item.actual) : '';
                    let reponerValue = '';
                    let rowClass = 'hover:bg-gray-100 transition-colors';
                    let reponerClass = 'text-gray-400';

                    if (actualValue !== '') {
                        reponerValue = Math.max(0, item.ideal - actualValue);
                        if (reponerValue > 0) {
                            reponerClass = 'text-red-600 font-bold';
                            rowClass = 'bg-gray-50 hover:bg-gray-100 transition-colors';
                        } else {
                            reponerClass = 'text-green-600 font-bold';
                            rowClass = 'bg-gray-50 hover:bg-gray-100 transition-colors';
                        }
                    }

                    const tr = document.createElement('tr');
                    tr.className = rowClass;
                    tr.innerHTML = `
                        <td class="p-2 sm:p-3 border-b border-gray-200 font-medium text-gray-700 text-xs sm:text-base leading-tight">${item.name}</td>
                        <td class="p-2 sm:p-3 border-b border-gray-200 text-center font-bold text-gray-500 text-xs sm:text-base">${item.ideal}</td>
                        <td class="p-2 sm:p-3 border-b border-gray-200 text-center">
                            <input type="number" min="0" 
                                value="${item.actual}" 
                                oninput="window.updateItem(${index}, this.value)"
                                class="w-14 sm:w-20 text-center py-1 sm:py-1.5 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-[#154390] bg-white shadow-sm font-bold text-[#154390] text-sm sm:text-base"
                                placeholder="-"
                            >
                        </td>
                        <td class="p-2 sm:p-3 border-b border-gray-200 text-center ${reponerClass} text-sm sm:text-lg" id="reponer-${index}">
                            ${actualValue !== '' ? reponerValue : '-'}
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            });
        }

        window.updateItem = function(index, value) {
            if (value !== '' && parseInt(value) < 0) value = '0';
            inventory[index].actual = value;
            
            const actualValue = value !== '' ? parseInt(value) : '';
            const reponerCell = document.getElementById(`reponer-${index}`);
            const row = reponerCell.parentElement;

            if (actualValue !== '') {
                const reponerValue = Math.max(0, inventory[index].ideal - actualValue);
                reponerCell.textContent = reponerValue;
                
                if (reponerValue > 0) {
                    reponerCell.className = 'p-2 sm:p-3 border-b border-gray-200 text-center text-red-600 font-bold text-sm sm:text-lg';
                    row.className = 'bg-gray-50 hover:bg-gray-100 transition-colors';
                } else {
                    reponerCell.className = 'p-2 sm:p-3 border-b border-gray-200 text-center text-green-600 font-bold text-sm sm:text-lg';
                    row.className = 'bg-gray-50 hover:bg-gray-100 transition-colors';
                }
            } else {
                reponerCell.textContent = '-';
                reponerCell.className = 'p-2 sm:p-3 border-b border-gray-200 text-center text-gray-400 text-sm sm:text-lg';
                row.className = 'hover:bg-gray-100 transition-colors';
            }

            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => { saveDataToFirebase(); }, 1000);
        }

        window.clearAll = async function() {
            const fechaActual = document.getElementById('report-date').value;
            if(confirm(`¿Deseas borrar de la nube todos los datos del día ${fechaActual}?`)) {
                inventory = inventory.map(item => ({ ...item, actual: '' }));
                renderTable();
                await saveDataToFirebase();
                document.getElementById('search-input').value = '';
                showToast("Día limpiado en la nube");
            }
        }

        window.generarExcel = async function() {
            const start = document.getElementById('export-start').value;
            const end = document.getElementById('export-end').value;

            if (!start || !end) { showToast("Selecciona fecha de inicio y fin"); return; }
            if (start > end) { showToast("La fecha de inicio debe ser anterior a la de fin"); return; }

            showToast("Consultando a la nube...");
            toggleLoader(true);

            try {
                const q = query(collection(db, "inventarios"), where("__name__", ">=", start), where("__name__", "<=", end));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    alert("No se encontraron registros en la nube para estas fechas.");
                    toggleLoader(false); return;
                }

                const datosParaExcel = [];
                querySnapshot.forEach((doc) => {
                    const fecha = doc.id;
                    const items = doc.data().items;
                    items.forEach(item => {
                        if (item.actual !== '') {
                            const actual = parseInt(item.actual);
                            const reponer = Math.max(0, item.ideal - actual);
                            datosParaExcel.push({
                                "Fecha": fecha, "Insumo": item.name, "Stock Ideal": item.ideal,
                                "Stock Contado": actual, "Repuesto (Faltante)": reponer
                            });
                        }
                    });
                });

                if (datosParaExcel.length === 0) {
                    alert("Se encontraron fechas en la nube, pero no hay datos numéricos.");
                    toggleLoader(false); return;
                }

                const hoja = XLSX.utils.json_to_sheet(datosParaExcel);
                const libro = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(libro, hoja, "Insumos");
                XLSX.writeFile(libro, `Control_Insumos_CEV_${start}_al_${end}.xlsx`);
                showToast("Excel descargado correctamente");

            } catch (error) {
                alert("Hubo un problema al descargar los datos de la nube.");
            } finally {
                toggleLoader(false);
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
        }
    </script>
</body>
</html>
