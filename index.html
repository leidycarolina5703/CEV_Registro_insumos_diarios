        // --- CALENDARIO INTELIGENTE COLOMBIA ---
        function getHolidays(year) {
            const holidays = [];
            const addDays = (d, days) => new Date(d.getTime() + days * 86400000);
            const moveToMonday = (d) => {
                const day = d.getDay();
                if (day !== 1) {
                    const diff = (8 - day) % 7;
                    return addDays(d, diff === 0 ? 7 : diff);
                }
                return d;
            };
            const pushDate = (d) => {
                holidays.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
            };

            // Fijos
            pushDate(new Date(year, 0, 1)); // Año Nuevo
            pushDate(new Date(year, 4, 1)); // Trabajo
            pushDate(new Date(year, 6, 20)); // Independencia
            pushDate(new Date(year, 7, 7)); // Boyacá
            pushDate(new Date(year, 11, 8)); // Inmaculada
            pushDate(new Date(year, 11, 25)); // Navidad

            // Ley Emiliani
            pushDate(moveToMonday(new Date(year, 0, 6))); // Reyes
            pushDate(moveToMonday(new Date(year, 2, 19))); // San Jose
            pushDate(moveToMonday(new Date(year, 5, 29))); // San Pedro
            pushDate(moveToMonday(new Date(year, 7, 15))); // Asuncion
            pushDate(moveToMonday(new Date(year, 9, 12))); // Raza
            pushDate(moveToMonday(new Date(year, 10, 1))); // Todos los Santos
            pushDate(moveToMonday(new Date(year, 10, 11))); // Independencia Cartagena

            // Semana Santa (Algoritmo Computus)
            const a = year % 19, b = Math.floor(year / 100), c = year % 100;
            const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3);
            const h = (19 * a + b - d - g + 15) % 30, i = Math.floor(c / 4), k = c % 4;
            const l = (32 + 2 * e + 2 * i - h - k) % 7, m = Math.floor((a + 11 * h + 22 * l) / 451);
            const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
            const day = ((h + l - 7 * m + 114) % 31) + 1;
            const easter = new Date(year, month, day);

            pushDate(addDays(easter, -3)); // Jueves Santo
            pushDate(addDays(easter, -2)); // Viernes Santo
            pushDate(moveToMonday(addDays(easter, 39))); // Ascensión
            pushDate(moveToMonday(addDays(easter, 60))); // Corpus
            pushDate(moveToMonday(addDays(easter, 68))); // Sagrado Corazón

            return holidays;
        }

        function isYesterdayHoliday(dateString) {
            const [y, m, d] = dateString.split('-').map(Number);
            const currentDate = new Date(y, m - 1, d);
